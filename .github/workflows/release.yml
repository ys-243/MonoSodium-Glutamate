name: Flutter Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers when pushed version has tag like v1.0.0

jobs:
  build:
    name: Build Apps
    runs-on: macos-latest # Required for iOS compilation
    permissions:
      contents: write # Grants permission to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      # For Google Play compliance (optional), build an Android App Bundle (.aab)
      - name: Build Android App Bundle
        run: flutter build appbundle --release

      # Builds an unsigned .app folder and packages it into an .ipa file
      - name: Build iOS IPA
        run: flutter build ipa --release --no-codesign

      - name: Create and Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/ios/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}